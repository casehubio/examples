# Test configuration uses mock CryptographyClient
casehub.ledger.azure-keyvault.vault-url=https://test-vault.vault.azure.net/
casehub.ledger.azure-keyvault.key-mapping."claude\:reviewer@v1"=test-key
casehub.ledger.azure-keyvault.refresh-interval=24h

# Disable Hibernate ORM so Quarkus does not require a datasource for entity scanning.
# casehub-ledger-memory (test dep) provides CDI alternatives for all repository SPIs.
quarkus.hibernate-orm.enabled=false

# Select AzureKeyVaultAgentSigner over InMemoryAgentSigner and ConfiguredAgentSigner
quarkus.arc.selected-alternatives=io.casehub.ledger.signing.azure.quarkus.AzureKeyVaultAgentSigner

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: casehub
      POSTGRES_USER: casehub
      POSTGRES_PASSWORD: casehub
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casehub"]
      interval: 5s
      timeout: 5s
      retries: 5

  openclaw-gateway:
    image: openclaw/gateway:latest
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports: ["3000:3000"]

  casehub-openclaw:
    build:
      context: ../..
      dockerfile: app/src/main/docker/Dockerfile.jvm
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/casehub
      OPENCLAW_HOOK_BASE_URL: http://openclaw-gateway:3000
      CASEHUB_EXAMPLE_ENABLED: "true"
      CASEHUB_EXAMPLE_TENANCYID: "demo"
      CASEHUB_EXAMPLE_GATE_AGENTID: ${CASEHUB_EXAMPLE_GATE_AGENTID}
      # Agent config — SmallRye Config mapping rules:
      #   _ → .   |   __ → -   (double underscore for hyphens in property names)
      # session-key has a hyphen → SESSION__KEY (double underscore)
      # agentId names are hyphen-free → single underscore throughout
      # Per-example agents declared in each example's docker-compose.yml (not here)
    ports: ["8080:8080"]

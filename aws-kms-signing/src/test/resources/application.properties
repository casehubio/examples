# Test configuration uses mock KMS client
casehub.ledger.aws-kms.region=us-east-1
casehub.ledger.aws-kms.key-mapping."claude\:reviewer@v1"=arn:aws:kms:us-east-1:123456789012:key/test-key-id
casehub.ledger.aws-kms.refresh-interval=24h

# Disable Hibernate ORM so Quarkus does not require a datasource for entity scanning.
# casehub-ledger-memory (test dep) provides CDI alternatives for all repository SPIs.
quarkus.hibernate-orm.enabled=false

# Select AwsKmsAgentSigner over InMemoryAgentSigner and ConfiguredAgentSigner
quarkus.arc.selected-alternatives=io.casehub.ledger.signing.aws.quarkus.AwsKmsAgentSigner

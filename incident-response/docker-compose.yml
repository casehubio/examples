services:
  casehub-openclaw:
    extends:
      file: ../docker-compose.base.yml
      service: casehub-openclaw
    depends_on:
      postgres:
        condition: service_healthy
      openclaw-gateway:
        condition: service_started
      mock-logs:
        condition: service_started
      mock-config:
        condition: service_started
    environment:
      CASEHUB_EXAMPLE_GATE_AGENTID: resolver
      CASEHUB_OPENCLAW_AGENTS_INVESTIGATOR_SESSION__KEY: investigator
      CASEHUB_OPENCLAW_AGENTS_INVESTIGATOR_CAPABILITIES: incident-investigation
      CASEHUB_OPENCLAW_AGENTS_RESOLVER_SESSION__KEY: resolver
      CASEHUB_OPENCLAW_AGENTS_RESOLVER_CAPABILITIES: incident-resolution

  mock-logs:
    build:
      context: ./mocks
      dockerfile: Dockerfile
    command: python log_mock.py
    ports: ["5001:5001"]

  mock-config:
    build:
      context: ./mocks
      dockerfile: Dockerfile
    command: python config_mock.py
    ports: ["5002:5002"]

  postgres:
    extends:
      file: ../docker-compose.base.yml
      service: postgres

  openclaw-gateway:
    extends:
      file: ../docker-compose.base.yml
      service: openclaw-gateway

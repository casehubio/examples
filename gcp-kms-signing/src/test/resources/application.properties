# Test configuration uses mock KMS client
casehub.ledger.gcp-kms.project-id=test-project
casehub.ledger.gcp-kms.location-id=us-east1
casehub.ledger.gcp-kms.key-ring-id=test-keyring
casehub.ledger.gcp-kms.key-mapping."claude\:reviewer@v1"=test-key
casehub.ledger.gcp-kms.refresh-interval=24h

# Disable Hibernate ORM so Quarkus does not require a datasource for entity scanning.
# casehub-ledger-memory (test dep) provides CDI alternatives for all repository SPIs.
quarkus.hibernate-orm.enabled=false

# Select GcpKmsAgentSigner over InMemoryAgentSigner and ConfiguredAgentSigner
quarkus.arc.selected-alternatives=io.casehub.ledger.signing.gcp.quarkus.GcpKmsAgentSigner
